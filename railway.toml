[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "php -S 0.0.0.0:8080 -t public/"

[[deploy.preDeployCommands]]
command = "until mysqladmin ping -h $MYSQLHOST -P $MYSQLPORT -u $MYSQLUSER -p$MYSQLPASSWORD --silent; do echo 'Waiting for MySQL...'; sleep 2; done && mysql -h $MYSQLHOST -P $MYSQLPORT -u $MYSQLUSER -p$MYSQLPASSWORD $MYSQLDATABASE < /app/database/schema.sql"
